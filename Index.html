<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(#07111f,#02060d);
overflow:hidden;
font-family:'Cormorant Garamond',serif;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

.container{
text-align:center;
padding:20px;
}

h1{
font-family:'Dancing Script',cursive;
font-size:60px;
margin-bottom:15px;
}

.subtitle{
opacity:.8;
margin-bottom:40px;
font-size:20px;
}

.envelope{
width:220px;
height:140px;
background:#efe5d4;
margin:auto;
position:relative;
cursor:pointer;
border-radius:6px;
box-shadow:0 20px 40px rgba(0,0,0,.5);
transition:.4s;
}

.envelope:hover{
transform:translateY(-8px);
}

.flap{
position:absolute;
width:100%;
height:100%;
background:#ddd0bc;
clip-path:polygon(0 0,100% 0,50% 55%);
transform-origin:top;
transition:1s;
}

.letter{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:700px;
background:#faf7ef;
padding:40px;
border-radius:15px;
color:#333;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.letter h2{
font-family:'Dancing Script',cursive;
font-size:50px;
margin-bottom:20px;
}

.letter p{
line-height:1.8;
font-size:22px;
}

button{
margin-top:30px;
padding:12px 25px;
border:none;
background:#111;
color:white;
border-radius:30px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="stars"></div>

<div class="container">

<h1>For You ❤️</h1>

<div class="subtitle">
Click the envelope.
</div>

<div class="envelope" onclick="openLetter()">
<div class="flap" id="flap"></div>
</div>

</div>

<div class="letter" id="letter">

<h2>Dear You,</h2>

<p>
This is just a test website.

One day this page will hold memories,
photographs,
late-night thoughts,
and a letter written only for you.

If you're reading this,
it means you found a little piece of my heart,
saved here for you.
</p>

<button onclick="closeLetter()">Close</button>

</div>

<script>

for(let i=0;i<180;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*3+"s";

document.getElementById("stars").appendChild(star);

}

function openLetter(){

document.getElementById("flap").style.transform="rotateX(180deg)";

document.getElementById("letter").style.display="block";

}

function closeLetter(){

document.getElementById("flap").style.transform="rotateX(0deg)";

document.getElementById("letter").style.display="

</script>

</body>
</html>
